<!DOCTYPE html>
<html lang="en" data-theme="dark" data-color="purple">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile — Phantom Hacks</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>"/>
<style>
/* ============================================================ THEME */
:root{--accent:#ff6ef7;--cyan:#00f5ff;--green:#39ff14;--yellow:#ffe600;--red:#ff4455;--trans:0.25s ease;}
[data-theme="dark"]{--bg:#07070f;--bg2:#0d0d1a;--bg3:#111120;--card:#0f0f1e;--text:#e2e2f0;--muted:#6a6a9a;--faint:#2a2a4a;--border:rgba(255,255,255,0.07);--nav-bg:rgba(7,7,15,0.93);--glass:rgba(255,255,255,0.04);--shadow:rgba(0,0,0,0.6);--input-bg:rgba(255,255,255,0.05);}
[data-theme="light"]{--bg:#f2f2fa;--bg2:#e8e8f5;--bg3:#edecf8;--card:#ffffff;--text:#1a1a3a;--muted:#7070a0;--faint:#c0c0e0;--border:rgba(0,0,0,0.08);--nav-bg:rgba(255,255,255,0.96);--glass:rgba(0,0,0,0.03);--shadow:rgba(80,40,160,0.12);--input-bg:rgba(0,0,0,0.04);}
[data-color="purple"]{--p:#9d4edd;--pl:#c77dff;--pg:rgba(157,78,221,0.3);}
[data-color="blue"]{--p:#2563eb;--pl:#60a5fa;--pg:rgba(37,99,235,0.3);}
[data-color="cyan"]{--p:#0891b2;--pl:#22d3ee;--pg:rgba(8,145,178,0.3);}
[data-color="green"]{--p:#16a34a;--pl:#4ade80;--pg:rgba(22,163,74,0.3);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow-x:hidden;min-height:100vh;}
a{text-decoration:none;color:inherit}

/* ============================================================ NAV */
nav{background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;padding:0 20px;height:62px;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px var(--pg);}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--pl),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-back{margin-left:auto;padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;background:var(--glass);transition:all .2s;}
.nav-back:hover{border-color:var(--p);color:var(--pl);background:var(--pg);}

/* ============================================================ TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--card);border:1px solid var(--p);border-radius:12px;padding:13px 18px;box-shadow:0 8px 32px var(--pg);font-size:13px;color:var(--text);transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:10px;min-width:260px;}
.toast.show{transform:translateY(0);opacity:1;}

/* ============================================================ PROFILE LAYOUT */
.profile-container{max-width:860px;margin:0 auto;padding:32px 20px 60px;}

/* Hero card */
.profile-hero{background:linear-gradient(135deg,var(--pg),var(--glass));border:1px solid var(--border);border-radius:18px;padding:28px;display:flex;align-items:center;gap:24px;margin-bottom:28px;flex-wrap:wrap;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--pg),transparent);opacity:.4;pointer-events:none;}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar-big{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pl));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;box-shadow:0 0 28px var(--pg);border:3px solid var(--p);}
.avatar-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--p);box-shadow:0 0 28px var(--pg);}
.profile-info-top{flex:1;position:relative;z-index:1;}
.profile-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px;}
.profile-username{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--pl);margin-bottom:4px;}
.profile-role-badge{display:inline-flex;align-items:center;gap:6px;background:var(--pg);border:1px solid var(--p);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;color:var(--pl);margin-bottom:8px;}
.profile-college{font-size:13px;color:var(--muted);margin-bottom:4px;}
.profile-bio-display{font-size:13px;color:var(--muted);line-height:1.6;max-width:480px;}
.profile-stats-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
.pstat{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center;}
.pstat-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--pl);}
.pstat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.skills-display{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.skill-tag{padding:3px 10px;border-radius:14px;background:var(--pg);border:1px solid var(--p);color:var(--pl);font-size:11.5px;font-weight:600;}
.social-links{display:flex;gap:8px;margin-top:10px;}
.social-link{padding:5px 12px;border-radius:8px;background:var(--glass);border:1px solid var(--border);font-size:12px;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:5px;}
.social-link:hover{border-color:var(--p);color:var(--pl);background:var(--pg);}

/* ============================================================ TABS */
.profile-tabs{display:flex;gap:4px;background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;}
.ptab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:none;font-family:'Space Grotesk',sans-serif;}
.ptab.active{background:var(--card);color:var(--text);box-shadow:0 2px 10px var(--shadow);}
.ptab-section{display:none;}
.ptab-section.active{display:block;}

/* ============================================================ EDIT FORM */
.edit-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-full{margin-bottom:16px;}
.flabel{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;margin-bottom:7px;}
.finput{width:100%;padding:11px 14px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s;}
.finput:focus{border-color:var(--p);box-shadow:0 0 12px var(--pg);}
.finput::placeholder{color:var(--muted);}
select.finput option{background:var(--card);}
textarea.finput{resize:vertical;min-height:90px;line-height:1.6;}
.fsave-btn{padding:12px 28px;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 0 18px var(--pg);transition:all .2s;}
.fsave-btn:hover{box-shadow:0 0 32px var(--pg);transform:translateY(-1px);}
.fsave-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.form-section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;margin-top:8px;display:flex;align-items:center;gap:8px;}
.form-section-title::before{content:'';display:inline-block;width:3px;height:16px;background:linear-gradient(180deg,var(--p),var(--accent));border-radius:2px;}

/* skills */
.skills-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:32px;}
.skill-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;background:var(--pg);border:1px solid var(--p);color:var(--pl);font-size:11.5px;font-weight:600;}
.skill-x{cursor:pointer;opacity:.6;font-size:14px;line-height:1;margin-left:2px;}.skill-x:hover{opacity:1;}
.skill-add-row{display:flex;gap:8px;}
.skill-add-input{flex:1;padding:9px 12px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s;}
.skill-add-input:focus{border-color:var(--p);}
.skill-add-btn{padding:9px 16px;background:var(--pg);border:1.5px solid var(--p);color:var(--pl);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;}
.skill-add-btn:hover{background:var(--p);color:#fff;}

/* ============================================================ SAVES / REGISTRATIONS */
.cards-list{display:flex;flex-direction:column;gap:12px;}
.hack-card{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;overflow:hidden;transition:all .3s;cursor:pointer;}
.hack-card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 8px 24px var(--pg);}
.hack-emoji{width:80px;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,var(--pg),rgba(255,110,247,.05));flex-shrink:0;}
.hack-body{flex:1;padding:12px 16px;}
.hack-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;}
.hack-org{font-size:12px;color:var(--muted);margin-bottom:7px;}
.hack-meta{display:flex;gap:8px;flex-wrap:wrap;}
.hmeta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.hmeta .val{color:var(--text);font-weight:600;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.b-open{background:rgba(57,255,20,.1);color:#39ff14;border:1px solid rgba(57,255,20,.3);}
.b-closed{background:rgba(255,68,85,.1);color:#ff4455;border:1px solid rgba(255,68,85,.25);}
.b-ongoing{background:rgba(0,245,255,.1);color:#00f5ff;border:1px solid rgba(0,245,255,.25);}
.b-upcoming{background:rgba(255,230,0,.1);color:#ffe600;border:1px solid rgba(255,230,0,.25);}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-state h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;}

/* loading spinner */
.spinner{width:40px;height:40px;border-radius:50%;border:3px solid var(--glass);border-top-color:var(--p);animation:spin .7s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* not logged in screen */
.login-prompt{text-align:center;padding:80px 20px;}
.login-prompt h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:8px;}
.login-prompt p{color:var(--muted);margin-bottom:24px;}
.go-login-btn{padding:12px 28px;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 0 18px var(--pg);}

@media(max-width:600px){
  .profile-hero{flex-direction:column;text-align:center;align-items:center;}
  .form-grid{grid-template-columns:1fr;}
  .profile-stats-row{justify-content:center;}
  .social-links{justify-content:center;}
  .skills-display{justify-content:center;}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toastIcon">⚡</span><span id="toastMsg"></span></div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="logo" onclick="window.location.href='index.html'">
      <div class="logo-icon">👻</div>
      <div class="logo-text">Phantom Hacks</div>
    </div>
    <button class="nav-back" onclick="window.location.href='index.html'">← Back to Hackathons</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="profile-container" id="mainContent">
  <div class="spinner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

/* ============================================================ SUPABASE */
const SUPA_URL='https://frffynlzejbtnapooqvu.supabase.co';
const SUPA_KEY='sb_publishable_QW3l1XzcOGcvKIKeGVUv9w_jfe0IUtS';
const supa=window.supabase.createClient(SUPA_URL,SUPA_KEY,{
  auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'phantom_hacks_auth'}
});

/* ============================================================ TOAST */
function toast(icon,msg){
  document.getElementById('toastIcon').textContent=icon;
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);
}

/* ============================================================ STATE */
let currentUser=null;
let profileSkills=[];
let currentTab='edit';

/* ============================================================ INIT */
async function init(){
  const{data:{user}}=await supa.auth.getUser();
  if(!user){
    showLoginPrompt();
    return;
  }
  currentUser=user;
  await renderPage();
}

function showLoginPrompt(){
  document.getElementById('mainContent').innerHTML=`
    <div class="login-prompt">
      <div style="font-size:56px;margin-bottom:16px">👻</div>
      <h2>Sign in to view your profile</h2>
      <p>You need to be logged in to access your profile page.</p>
      <button class="go-login-btn" onclick="window.location.href='index.html'">← Go to Phantom Hacks</button>
    </div>`;
}

/* ============================================================ RENDER PAGE */
async function renderPage(){
  // load profile from DB
  const{data:prof}=await supa.from('profiles').select('*').eq('id',currentUser.id).single();

  // load stats
  const{count:saveCount}=await supa.from('saved_hackathons').select('*',{count:'exact',head:true}).eq('user_id',currentUser.id);
  const{count:regCount}=await supa.from('registrations').select('*',{count:'exact',head:true}).eq('user_id',currentUser.id);
  const{count:postCount}=await supa.from('hackathons').select('*',{count:'exact',head:true}).eq('source','phantom');

  // init skills
  profileSkills=prof?.skills||[];

  const name=prof?.full_name||currentUser.user_metadata?.full_name||currentUser.email.split('@')[0];
  const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const roleLabels={student:'🎓 Student',working:'💼 Working Professional',teacher:'👨‍🏫 Teacher / Mentor',researcher:'🔬 Researcher',entrepreneur:'🚀 Entrepreneur',other:'✨ Other'};
  const roleLabel=prof?.role?roleLabels[prof.role]||prof.role:'';

  document.getElementById('mainContent').innerHTML=`
    <!-- HERO -->
    <div class="profile-hero">
      <div class="avatar-wrap">
        ${prof?.avatar_url
          ?`<img class="avatar-img" src="${prof.avatar_url}" alt="Avatar"/>`
          :`<div class="avatar-big">${initials}</div>`}
      </div>
      <div class="profile-info-top">
        <div class="profile-name">${name}</div>
        ${prof?.username?`<div class="profile-username">@${prof.username}</div>`:''}
        ${roleLabel?`<div class="profile-role-badge">${roleLabel}</div>`:''}
        ${prof?.college?`<div class="profile-college">🏫 ${prof.college}</div>`:''}
        ${prof?.bio?`<div class="profile-bio-display">${prof.bio}</div>`:''}
        ${profileSkills.length?`<div class="skills-display">${profileSkills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>`:''}
        <div class="social-links">
          ${prof?.github_url?`<a class="social-link" href="${prof.github_url}" target="_blank" rel="noopener">🐙 GitHub</a>`:''}
          ${prof?.linkedin_url?`<a class="social-link" href="${prof.linkedin_url}" target="_blank" rel="noopener">💼 LinkedIn</a>`:''}
        </div>
        <div class="profile-stats-row">
          <div class="pstat"><div class="pstat-num">${saveCount||0}</div><div class="pstat-label">Saved</div></div>
          <div class="pstat"><div class="pstat-num">${regCount||0}</div><div class="pstat-label">Registered</div></div>
          <div class="pstat"><div class="pstat-num">${postCount||0}</div><div class="pstat-label">Posted</div></div>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="profile-tabs">
      <button class="ptab active" id="tabBtnEdit" onclick="switchTab('edit',this)">✏️ Edit Profile</button>
      <button class="ptab" id="tabBtnSaves" onclick="switchTab('saves',this)">🔖 My Saves</button>
      <button class="ptab" id="tabBtnRegs" onclick="switchTab('regs',this)">📋 Registrations</button>
    </div>

    <!-- EDIT TAB -->
    <div class="ptab-section active" id="sectionEdit">
      <div class="edit-card">
        <div class="form-section-title">Basic Info</div>
        <div class="form-grid">
          <div>
            <label class="flabel">Full Name</label>
            <input class="finput" id="pName" type="text" value="${prof?.full_name||currentUser.user_metadata?.full_name||''}" placeholder="Your full name"/>
          </div>
          <div>
            <label class="flabel">Username</label>
            <input class="finput" id="pUsername" type="text" value="${prof?.username||''}" placeholder="@username"/>
          </div>
        </div>
        <div class="form-grid">
          <div>
            <label class="flabel">Date of Birth</label>
            <input class="finput" id="pDob" type="date" value="${prof?.dob||''}"/>
          </div>
          <div>
            <label class="flabel">Role</label>
            <select class="finput" id="pRole">
              <option value="">Select your role</option>
              <option value="student" ${prof?.role==='student'?'selected':''}>🎓 Student</option>
              <option value="working" ${prof?.role==='working'?'selected':''}>💼 Working Professional</option>
              <option value="teacher" ${prof?.role==='teacher'?'selected':''}>👨‍🏫 Teacher / Mentor</option>
              <option value="researcher" ${prof?.role==='researcher'?'selected':''}>🔬 Researcher</option>
              <option value="entrepreneur" ${prof?.role==='entrepreneur'?'selected':''}>🚀 Entrepreneur</option>
              <option value="other" ${prof?.role==='other'?'selected':''}>✨ Other</option>
            </select>
          </div>
        </div>
        <div class="form-full">
          <label class="flabel">College / School / Organisation</label>
          <input class="finput" id="pCollege" type="text" value="${prof?.college||''}" placeholder="IIT Bombay, VIT Vellore, Google..."/>
        </div>
        <div class="form-full">
          <label class="flabel">Bio</label>
          <textarea class="finput" id="pBio" placeholder="Tell the community about yourself...">${prof?.bio||''}</textarea>
        </div>

        <div class="form-section-title" style="margin-top:20px">Skills</div>
        <div class="skills-wrap" id="skillsWrap"></div>
        <div class="skill-add-row" style="margin-bottom:20px">
          <input class="skill-add-input" id="skillInput" type="text" placeholder="Add a skill (e.g. React, Python, UI Design)"/>
          <button class="skill-add-btn" onclick="addSkill()">+ Add</button>
        </div>

        <div class="form-section-title">Social Links</div>
        <div class="form-grid">
          <div>
            <label class="flabel">GitHub URL</label>
            <input class="finput" id="pGithub" type="url" value="${prof?.github_url||''}" placeholder="https://github.com/you"/>
          </div>
          <div>
            <label class="flabel">LinkedIn URL</label>
            <input class="finput" id="pLinkedin" type="url" value="${prof?.linkedin_url||''}" placeholder="https://linkedin.com/in/you"/>
          </div>
        </div>

        <button class="fsave-btn" id="saveBtn" onclick="saveProfile()">💾 Save Profile</button>
      </div>
    </div>

    <!-- SAVES TAB -->
    <div class="ptab-section" id="sectionSaves">
      <div class="spinner" id="savesSpinner"></div>
      <div class="cards-list" id="savesList"></div>
    </div>

    <!-- REGISTRATIONS TAB -->
    <div class="ptab-section" id="sectionRegs">
      <div class="spinner" id="regsSpinner"></div>
      <div class="cards-list" id="regsList"></div>
    </div>
  `;

  // render skills chips
  renderSkills();

  // Enter key on skill input
  document.getElementById('skillInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();addSkill();}
  });
}

/* ============================================================ TABS */
function switchTab(tab,el){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ptab-section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('section'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  currentTab=tab;
  if(tab==='saves') loadSaves();
  if(tab==='regs') loadRegistrations();
}

/* ============================================================ SAVES */
async function loadSaves(){
  const{data}=await supa.from('saved_hackathons')
    .select('hackathons(*)')
    .eq('user_id',currentUser.id)
    .order('created_at',{ascending:false});
  const list=document.getElementById('savesList');
  const spinner=document.getElementById('savesSpinner');
  if(spinner)spinner.remove();
  if(!data||!data.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🔖</div><h3>No saves yet</h3><p>Go back and save some hackathons!</p></div>`;
    return;
  }
  const bClass={open:'b-open',closed:'b-closed',ongoing:'b-ongoing',upcoming:'b-upcoming'};
  const bLabel={open:'● OPEN',closed:'✕ CLOSED',ongoing:'▶ ONGOING',upcoming:'⏳ UPCOMING'};
  list.innerHTML=data.map(s=>{
    const h=s.hackathons;if(!h)return'';
    return`<div class="hack-card" onclick="window.location.href='hackathon.html?id=${h.id}'">
      <div class="hack-emoji">${h.emoji}</div>
      <div class="hack-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div class="hack-title">${h.title}</div>
          <span class="badge ${bClass[h.status]||'b-upcoming'}">${bLabel[h.status]||h.status}</span>
        </div>
        <div class="hack-org">🏛️ ${h.org}</div>
        <div class="hack-meta">
          <div class="hmeta">🏆 <span class="val">${h.prize}</span></div>
          <div class="hmeta">⏰ <span class="val">${h.deadline}</span></div>
          <div class="hmeta">📍 <span class="val">${h.location}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ============================================================ REGISTRATIONS */
async function loadRegistrations(){
  const{data}=await supa.from('registrations')
    .select('*,hackathons(title,emoji,status,deadline,location,org,url)')
    .eq('user_id',currentUser.id)
    .order('created_at',{ascending:false});
  const list=document.getElementById('regsList');
  const spinner=document.getElementById('regsSpinner');
  if(spinner)spinner.remove();
  if(!data||!data.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><h3>No registrations yet</h3><p>Register for a hackathon to see it here</p></div>`;
    return;
  }
  const bClass={open:'b-open',closed:'b-closed',ongoing:'b-ongoing',upcoming:'b-upcoming'};
  list.innerHTML=data.map(r=>{
    const h=r.hackathons;
    const regDate=new Date(r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    return`<div class="hack-card" style="cursor:default">
      <div class="hack-emoji">${h?.emoji||'👻'}</div>
      <div class="hack-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div class="hack-title">${h?.title||'Hackathon'}</div>
          <span class="badge ${bClass[h?.status]||'b-upcoming'}">${h?.status?.toUpperCase()||''}</span>
        </div>
        <div class="hack-org">👤 ${r.full_name} · ${r.college||'—'} ${r.team_name?'· 👥 '+r.team_name:''}</div>
        <div class="hack-meta">
          <div class="hmeta">📅 Registered: <span class="val">${regDate}</span></div>
          ${h?.url?`<div class="hmeta"><a href="${h.url}" target="_blank" rel="noopener" style="color:var(--pl);font-weight:600;font-size:11px">↗ Visit Event</a></div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ============================================================ SKILLS */
function renderSkills(){
  const wrap=document.getElementById('skillsWrap');
  if(!wrap)return;
  wrap.innerHTML=profileSkills.length
    ? profileSkills.map((s,i)=>`<div class="skill-chip">${s}<span class="skill-x" onclick="removeSkill(${i})">×</span></div>`).join('')
    : `<span style="font-size:12px;color:var(--muted)">No skills added yet</span>`;
}
function addSkill(){
  const inp=document.getElementById('skillInput');
  const val=inp.value.trim();
  if(!val||profileSkills.includes(val))return;
  profileSkills.push(val);
  renderSkills();
  inp.value='';inp.focus();
}
function removeSkill(i){
  profileSkills.splice(i,1);
  renderSkills();
}

/* ============================================================ SAVE PROFILE */
async function saveProfile(){
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving...';btn.disabled=true;
  const payload={
    id:currentUser.id,
    full_name:document.getElementById('pName').value.trim(),
    username:document.getElementById('pUsername').value.trim().replace('@','').toLowerCase()||null,
    dob:document.getElementById('pDob').value||null,
    role:document.getElementById('pRole').value||null,
    college:document.getElementById('pCollege').value.trim()||null,
    bio:document.getElementById('pBio').value.trim()||null,
    github_url:document.getElementById('pGithub').value.trim()||null,
    linkedin_url:document.getElementById('pLinkedin').value.trim()||null,
    skills:profileSkills,
    updated_at:new Date().toISOString(),
  };
  const{error}=await supa.from('profiles').upsert(payload);
  btn.textContent='💾 Save Profile';btn.disabled=false;
  if(error){
    toast('❌','Failed to save: '+error.message);
  } else {
    toast('✅','Profile saved successfully!');
    // update hero display without full reload
    document.querySelector('.profile-name').textContent=payload.full_name||currentUser.email.split('@')[0];
    if(payload.username) document.querySelector('.profile-username')&&(document.querySelector('.profile-username').textContent='@'+payload.username);
    await renderPage(); // re-render to reflect changes
  }
}

/* ============================================================ START */
init();
</script>
